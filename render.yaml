services:
  - type: web
    name: paineldrop
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    # Plano gratuito (512 MB RAM) — suficiente para o painel
    # Para APKs grandes ou uso intenso, considere o plano Starter
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: STORAGE_DIR
        value: /tmp/apk-storage
      # ── Banco de dados MySQL ─────────────────────────────────────────────────
      # Cole a connection string do seu banco (TiDB, PlanetScale, Railway MySQL, etc.)
      # Formato: mysql://user:password@host:3306/dbname
      - key: DATABASE_URL
        sync: false
      # ── Autenticação JWT ─────────────────────────────────────────────────────
      # Gere um valor seguro com: openssl rand -base64 32
      - key: JWT_SECRET
        generateValue: true
      # ── Manus OAuth (opcional) ───────────────────────────────────────────────
      - key: VITE_APP_ID
        sync: false
      - key: OAUTH_SERVER_URL
        value: https://api.manus.im
      - key: VITE_OAUTH_PORTAL_URL
        value: https://manus.im
      - key: OWNER_OPEN_ID
        sync: false
      - key: OWNER_NAME
        sync: false
      # ── Manus Forge API (opcional) ───────────────────────────────────────────
      - key: BUILT_IN_FORGE_API_URL
        sync: false
      - key: BUILT_IN_FORGE_API_KEY
        sync: false
      - key: VITE_FRONTEND_FORGE_API_KEY
        sync: false
      - key: VITE_FRONTEND_FORGE_API_URL
        sync: false
